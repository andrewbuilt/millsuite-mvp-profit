<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MillSuite · Shop Setup Walkthroughs (Clickable Wireframe)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    background: #0a0a0a; color: #e5e5e5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .app { display: flex; flex-direction: column; min-height: 100vh; }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px; background: #0d0d0d; border-bottom: 1px solid #1a1a1a;
  }
  .brand { font-size: 13px; color: #fff; font-weight: 600; letter-spacing: 0.3px; }
  .brand .diamond { color: #3b82f6; margin-right: 6px; }
  .topbar-right { display: flex; align-items: center; gap: 18px; }
  .step-label { font-size: 11.5px; color: #777; }
  .exit { font-size: 11.5px; color: #666; cursor: pointer; }
  .exit:hover { color: #ccc; }

  /* Progress */
  .progress-bar { height: 2px; background: #1a1a1a; }
  .progress-fill {
    height: 100%; background: #3b82f6; transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }

  /* Content wrap */
  .content {
    flex: 1; display: flex; justify-content: center; align-items: flex-start;
    padding: 40px 24px 100px; overflow-y: auto;
  }
  .screen {
    width: 100%; max-width: 980px;
    animation: fadeIn 0.3s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Headings */
  h1.page-h1 {
    font-size: 28px; color: #fff; font-weight: 600; letter-spacing: -0.4px;
    margin-bottom: 10px; line-height: 1.25;
  }
  .page-lede {
    font-size: 15px; color: #aaa; line-height: 1.6; margin-bottom: 28px;
    max-width: 640px;
  }

  /* Setup selector */
  .selector-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
    margin-top: 8px;
  }
  @media (max-width: 640px) { .selector-grid { grid-template-columns: 1fr; } }
  .setup-tile {
    padding: 20px 22px; background: #0d0d0d; border: 1px solid #1a1a1a;
    border-radius: 12px; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
  }
  .setup-tile:hover:not(.locked) {
    border-color: #3b82f6; background: #0f1a2a; transform: translateY(-1px);
  }
  .setup-tile.locked { opacity: 0.45; cursor: default; }
  .setup-tile .tile-body { flex: 1; min-width: 0; }
  .setup-tile .tile-name { font-size: 15px; color: #fff; font-weight: 600; margin-bottom: 3px; }
  .setup-tile .tile-desc { font-size: 12px; color: #888; }
  .setup-tile .tile-status {
    font-size: 10.5px; color: #666; padding: 3px 9px; border-radius: 10px;
    background: #111; border: 1px solid #1a1a1a; text-transform: uppercase; letter-spacing: 0.7px;
    font-weight: 600; white-space: nowrap;
  }
  .setup-tile .tile-status.ready { color: #93c5fd; background: #0f1a2a; border-color: #1e3a5c; }
  .setup-tile .tile-status.done { color: #86efac; background: #0a1a12; border-color: #1e3a2c; }

  /* Text-only screens (opener + how-it-works) */
  .text-screen { max-width: 640px; }
  .text-screen h1 {
    font-size: 28px; color: #fff; font-weight: 600; letter-spacing: -0.4px;
    margin-bottom: 16px; line-height: 1.25;
  }
  .text-screen p {
    font-size: 15px; color: #bbb; line-height: 1.7; margin-bottom: 14px;
  }

  /* Operation step layout */
  .op-step {
    display: grid; grid-template-columns: 1fr 320px;
    gap: 36px; align-items: flex-start;
  }
  @media (max-width: 880px) {
    .op-step { grid-template-columns: 1fr; }
  }
  .op-main { min-width: 0; }
  .op-side {
    background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 12px;
    padding: 18px; position: sticky; top: 20px;
  }

  .step-num {
    font-size: 11px; color: #3b82f6; text-transform: uppercase;
    letter-spacing: 1.4px; font-weight: 600; margin-bottom: 12px;
  }
  .op-main h1 {
    font-size: 26px; color: #fff; font-weight: 600; letter-spacing: -0.3px;
    margin-bottom: 10px; line-height: 1.25;
  }
  .op-main .prompt {
    font-size: 15px; color: #bbb; line-height: 1.55; margin-bottom: 28px;
    max-width: 560px;
  }

  /* Number stepper */
  .stepper {
    display: inline-flex; align-items: stretch; gap: 0;
    border: 1px solid #2a2a2a; border-radius: 10px;
    background: #111; overflow: hidden;
    transition: all 0.15s;
  }
  .stepper:focus-within { border-color: #3b82f6; background: #141820; }
  .stepper.skipped { opacity: 0.5; border-style: dashed; }
  .stepper-btn {
    width: 52px; background: transparent; border: none; color: #999;
    font-size: 22px; cursor: pointer; user-select: none;
    transition: color 0.15s, background 0.15s;
    font-family: inherit; line-height: 1;
  }
  .stepper-btn:hover:not(:disabled) { color: #fff; background: #1a1a1a; }
  .stepper-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .stepper-input {
    width: 110px; background: transparent; border: none; outline: none;
    color: #fff; text-align: center;
    font-family: "SF Mono", Menlo, monospace;
    font-size: 26px; font-weight: 500; padding: 16px 0;
    -moz-appearance: textfield;
  }
  .stepper-input::-webkit-outer-spin-button,
  .stepper-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .stepper-input::placeholder { color: #333; }
  .stepper-unit {
    align-self: center; font-size: 13px; color: #666;
    margin-left: 14px; font-weight: 500;
  }

  .input-row { display: flex; align-items: center; margin-top: 4px; margin-bottom: 4px; }

  /* Step nav */
  .step-nav {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 44px; padding-top: 24px; border-top: 1px solid #1a1a1a;
  }
  .step-nav-right { display: flex; gap: 10px; }
  .btn {
    padding: 11px 22px; font-size: 13px; font-weight: 500;
    border-radius: 8px; cursor: pointer; transition: all 0.15s;
    background: #1e1e1e; border: 1px solid #2a2a2a; color: #ddd;
    font-family: inherit;
  }
  .btn:hover:not(:disabled) { background: #252525; border-color: #333; color: #fff; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: #3b82f6; border-color: #3b82f6; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #2563eb; }
  .btn-ghost { background: transparent; border-color: transparent; color: #888; }
  .btn-ghost:hover:not(:disabled) { color: #ccc; background: #1a1a1a; }
  .btn-big { padding: 14px 28px; font-size: 14px; font-weight: 600; }

  /* Walkthrough map (sidebar) */
  .map-label {
    font-size: 10px; color: #666; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 12px; font-weight: 600;
  }
  .side-steps {
    list-style: none; display: flex; flex-direction: column; gap: 2px;
  }
  .side-step {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 6px; font-size: 12.5px;
    color: #777; cursor: pointer; transition: all 0.15s;
  }
  .side-step:hover { background: #111; color: #ccc; }
  .side-step.current {
    color: #fff; background: #0f1a2a;
  }
  .side-step.done { color: #b8cfe8; }
  .side-step .chk {
    width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
    background: #1a1a1a; color: #555;
  }
  .side-step.done .chk { background: #1e3a2c; color: #86efac; }
  .side-step.current .chk { background: #3b82f6; color: #fff; }
  .side-step.skipped .chk { background: #2a2015; color: #a98a5a; }
  .side-step .hrs {
    margin-left: auto; font-family: "SF Mono", Menlo, monospace;
    font-size: 11px; color: #555;
  }
  .side-step.done .hrs { color: #8ab8dc; }
  .side-step.skipped .hrs { color: #8a7540; font-style: italic; }

  .side-running {
    margin-top: 14px; padding-top: 14px; border-top: 1px solid #1a1a1a;
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .side-running .lbl { font-size: 11px; color: #777; text-transform: uppercase; letter-spacing: 0.8px; }
  .side-running .val {
    font-family: "SF Mono", Menlo, monospace; font-size: 15px; color: #fff; font-weight: 600;
  }

  /* Summary */
  .summary h1 {
    font-size: 28px; color: #fff; font-weight: 600; letter-spacing: -0.4px;
    margin-bottom: 8px;
  }
  .summary .sub { font-size: 14px; color: #999; margin-bottom: 28px; }

  .summary-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 18px;
    margin-bottom: 24px;
  }
  @media (max-width: 780px) { .summary-grid { grid-template-columns: 1fr; } }

  .card {
    background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 12px;
    padding: 22px;
  }
  .card .card-title {
    font-size: 11px; color: #777; text-transform: uppercase;
    letter-spacing: 1px; font-weight: 600; margin-bottom: 16px;
  }
  .headline-num {
    font-family: "SF Mono", Menlo, monospace; font-size: 32px;
    color: #fff; font-weight: 600; letter-spacing: -0.4px; margin-bottom: 4px;
  }
  .headline-label { font-size: 12px; color: #888; }

  .dept-rows { display: grid; gap: 10px; margin-top: 6px; }
  .dept-row {
    display: grid; grid-template-columns: 90px 1fr 66px 80px;
    gap: 12px; align-items: center; font-size: 12.5px;
    padding: 6px 0;
  }
  .dept-row .name { color: #ccc; font-weight: 500; }
  .dept-row .bar-wrap {
    height: 6px; background: #111; border-radius: 3px; overflow: hidden;
  }
  .dept-row .bar { height: 100%; border-radius: 3px; }
  .dept-row.eng .bar       { background: #10b981; }
  .dept-row.cnc .bar       { background: #3b82f6; }
  .dept-row.assembly .bar  { background: #8b5cf6; }
  .dept-row.finish .bar    { background: #f59e0b; }
  .dept-row .hrs  { font-family: "SF Mono", Menlo, monospace; font-size: 12px; color: #aaa; text-align: right; }
  .dept-row .cost { font-family: "SF Mono", Menlo, monospace; font-size: 12.5px; color: #e5e5e5; text-align: right; font-weight: 500; }

  /* Edit table */
  .edit-table {
    background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 12px;
    margin-bottom: 24px; overflow: hidden;
  }
  .edit-table-head, .edit-table-row {
    display: grid; grid-template-columns: 30px 1fr 110px 70px;
    padding: 12px 18px; align-items: center;
  }
  .edit-table-head {
    background: #0f0f0f; border-bottom: 1px solid #1a1a1a;
    font-size: 10.5px; color: #666; text-transform: uppercase; letter-spacing: 1px;
    font-weight: 600;
  }
  .edit-table-row {
    border-bottom: 1px solid #141414; font-size: 13px;
  }
  .edit-table-row:last-child { border-bottom: none; }
  .edit-table-row .step-idx { color: #555; font-family: "SF Mono", Menlo, monospace; font-size: 11px; }
  .edit-table-row .step-desc { color: #ddd; }
  .edit-table-row .step-desc .dept-tag {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: 10px; font-weight: 600; margin-left: 8px;
    background: #1a2d4a; color: #93c5fd;
    text-transform: uppercase; letter-spacing: 0.7px;
  }
  .edit-table-row .dept-tag.engineering { background: #0e2a1f; color: #86efac; }
  .edit-table-row .dept-tag.assembly    { background: #2a1e4a; color: #c4b5fd; }
  .edit-table-row .dept-tag.finish      { background: #3a2a0d; color: #fbbf24; }
  .edit-table-row input.edit-time {
    background: #111; border: 1px solid #2a2a2a; border-radius: 6px;
    padding: 6px 10px; font-size: 13px; color: #fff; width: 90px;
    text-align: right; font-family: "SF Mono", Menlo, monospace;
  }
  .edit-table-row input.edit-time:focus { outline: none; border-color: #3b82f6; background: #141820; }
  .edit-table-row .row-skip {
    font-size: 11px; color: #666; cursor: pointer; text-align: right;
    padding: 4px 8px; border-radius: 4px;
  }
  .edit-table-row .row-skip:hover { background: #1a1a1a; color: #aaa; }
  .edit-table-row .skipped-tag {
    font-family: "SF Mono", Menlo, monospace; color: #8a7540; font-style: italic;
    font-size: 11px; text-align: right;
  }

  /* Sanity banner */
  .sanity {
    padding: 12px 18px; background: #0d0d0d; border: 1px solid #1a1a1a;
    border-radius: 10px; margin-bottom: 20px; font-size: 13px; color: #aaa; line-height: 1.55;
  }
  .sanity.good { border-color: #1e3a2c; background: #0a1a12; }
  .sanity.good strong { color: #86efac; }
  .sanity.warn { border-color: #3a2a0d; background: #1a1208; }
  .sanity.warn strong { color: #fbbf24; }

  .summary-actions {
    display: flex; justify-content: space-between; gap: 10px; margin-top: 8px;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translate(-50%, 12px);
    padding: 10px 16px; background: #1a2d4a; border: 1px solid #2d5a8a;
    color: #dbeafe; border-radius: 8px; font-size: 12.5px;
    opacity: 0; transition: all 0.25s;
    z-index: 100; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"><span class="diamond">◆</span> MillSuite</div>
    <div class="topbar-right">
      <span class="step-label" id="stepLabel"></span>
      <span class="exit" onclick="toast('Saved. You can pick back up later.')">Save and exit</span>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="content">
    <div class="screen" id="screen"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ---------------------------------------------------------------------------
// Setups available on the menu (V1 only lights up "base")
// ---------------------------------------------------------------------------
const SETUPS = [
  { id: 'base',    name: 'Base cabinets',        desc: "8' run, veneered slab doors, clear matte finish",  active: true  },
  { id: 'uppers',  name: 'Upper cabinets',       desc: "If different from base",                           active: false },
  { id: 'tall',    name: 'Full-height cabinets', desc: "Pantries, built-ins, tall storage",                active: false },
  { id: 'panels',  name: 'Finish panels',        desc: "End panels, fillers, applied moldings",            active: false },
  { id: 'kick',    name: 'Shop kick',            desc: "If you build your own instead of using legs",      active: false },
  { id: 'drawers', name: 'Drawers',              desc: "Boxes + fronts",                                   active: false },
];

// ---------------------------------------------------------------------------
// Base-cabinet walkthrough operations
// ---------------------------------------------------------------------------
const OPERATIONS = [
  { id: 'engineering',      dept: 'Engineering', heading: 'Shop drawings + CNC program',
    prompt: "How long does it take to draw up shop drawings and program the cuts for an 8' base run in your shop?" },
  { id: 'cutInterior',      dept: 'CNC',         heading: 'Cut interior parts',
    prompt: "How long does it take to cut the bottom, sides, dividers, nailers, and adjustable shelves for an 8' pre-finished cabinet?" },
  { id: 'edgebandInterior', dept: 'Assembly',    heading: 'Edgebanding',
    prompt: "How long does it take to edgeband those parts in your shop?" },
  { id: 'boxAssembly',      dept: 'Assembly',    heading: 'Box assembly',
    prompt: "How long does it take to screw the boxes together in your shop?" },
  { id: 'cutDoors',         dept: 'CNC',         heading: 'Cut doors',
    prompt: "How long does it take to cut an 8' run of veneer slab doors in your shop?" },
  { id: 'edgebandDoors',    dept: 'Assembly',    heading: 'Edgeband doors',
    prompt: "How long does it take to edgeband the doors in your shop?" },
  { id: 'hingeCups',        dept: 'CNC',         heading: 'Machine hinge cups',
    prompt: "How long does it take to drill the hinge cups in your shop? Zero if you're machining doors on your CNC." },
  { id: 'finish',           dept: 'Finish',      heading: 'Finish the doors',
    prompt: "How long does it take to prep and finish the doors (clear matte lacquer, sanded between coats) in your shop?" },
  { id: 'fullAssembly',     dept: 'Assembly',    heading: 'Full assembly',
    prompt: "How long does it take to install hinge plates, knock in shelf pin sleeves, mount doors, etc? If you consider a cabinet finished once it's been wrapped, include that time too." },
];

// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
// Screens: 0 = selector, 1 = opener, 2 = how-it-works, 3..(3+N-1) = operations, last = summary
const STEP = { SELECTOR: 0, OPENER: 1, HOW: 2, OPS_START: 3 };
const state = {
  stepIndex: 0,
  answers: {}, // { opId: { hours: Number, skipped: bool } }
  shopRates: { Engineering: 95, CNC: 85, Assembly: 85, Finish: 90 },
};
const TOTAL_STEPS = STEP.OPS_START + OPERATIONS.length + 1; // selector + opener + how + N ops + summary

// ---------------------------------------------------------------------------
// DOM
// ---------------------------------------------------------------------------
const screenEl = document.getElementById('screen');
const progressEl = document.getElementById('progressFill');
const stepLabelEl = document.getElementById('stepLabel');

function money(n) { return '$' + Math.round(n).toLocaleString(); }
function fmtHrs(h) {
  if (h == null) return '—';
  if (h === 0) return '0';
  // always as decimal, drop trailing .00
  const s = h.toFixed(2);
  return s.replace(/\.?0+$/, '') + ' hr' + (h === 1 ? '' : 's');
}

// ---------------------------------------------------------------------------
// Render router
// ---------------------------------------------------------------------------
function render() {
  const idx = state.stepIndex;
  progressEl.style.width = (idx / (TOTAL_STEPS - 1)) * 100 + '%';

  if (idx === STEP.SELECTOR) { stepLabelEl.textContent = ''; renderSelector(); }
  else if (idx === STEP.OPENER) { stepLabelEl.textContent = 'Base cabinets'; renderOpener(); }
  else if (idx === STEP.HOW)    { stepLabelEl.textContent = 'Base cabinets'; renderHow(); }
  else if (idx === TOTAL_STEPS - 1) { stepLabelEl.textContent = 'Summary'; renderSummary(); }
  else {
    const opIdx = idx - STEP.OPS_START;
    stepLabelEl.textContent = `Base cabinets · Step ${opIdx + 1} of ${OPERATIONS.length}`;
    renderOperation(opIdx);
  }
  document.querySelector('.content').scrollTop = 0;
}

// ---------------------------------------------------------------------------
// Screen 0 — Setup selector
// ---------------------------------------------------------------------------
function renderSelector() {
  screenEl.innerHTML = `
    <h1 class="page-h1">Shop setup</h1>
    <div class="page-lede">Each of these is a short walkthrough that calibrates MillSuite to how <em>your</em> shop works. Start with base cabinets — the others build on it.</div>
    <div class="selector-grid">
      ${SETUPS.map(s => {
        const done = s.id === 'base' && Object.keys(state.answers).length === OPERATIONS.length
          && OPERATIONS.every(o => { const a = state.answers[o.id]; return a && (a.skipped || a.hours != null); });
        const status = done ? 'Complete' : (s.active ? 'Start here' : 'Later');
        const statusCls = done ? 'done' : (s.active ? 'ready' : '');
        const onclick = s.active ? `onclick="state.stepIndex=${STEP.OPENER}; render()"` : '';
        return `<div class="setup-tile ${s.active ? '' : 'locked'}" ${onclick}>
          <div class="tile-body">
            <div class="tile-name">${s.name}</div>
            <div class="tile-desc">${s.desc}</div>
          </div>
          <div class="tile-status ${statusCls}">${status}</div>
        </div>`;
      }).join('')}
    </div>
  `;
}

// ---------------------------------------------------------------------------
// Screen 1 — Opener for base cabinets
// ---------------------------------------------------------------------------
function renderOpener() {
  screenEl.innerHTML = `
    <div class="text-screen">
      <h1>Let's run numbers on your base cabinets.</h1>
      <p>Every shop is different. Some have CNCs, some tracksaws. Some have edgebanders and some are ironing on banding. Let's dial in your specific labor hours.</p>
      <div class="step-nav" style="border: none; margin-top: 36px; padding-top: 0; justify-content: flex-start; gap: 10px;">
        <button class="btn btn-ghost" onclick="back()">← Back</button>
        <button class="btn btn-primary btn-big" onclick="next()">Continue →</button>
      </div>
    </div>
  `;
}

// ---------------------------------------------------------------------------
// Screen 2 — How this works
// ---------------------------------------------------------------------------
function renderHow() {
  screenEl.innerHTML = `
    <div class="text-screen">
      <h1>How this works.</h1>
      <p>We're going to think through building an 8' cabinet with veneered doors and a matte clear finish. We'll walk you through each step and at the end we'll have some good baseline numbers to start cranking out estimates.</p>
      <div class="step-nav" style="border: none; margin-top: 36px; padding-top: 0; justify-content: flex-start; gap: 10px;">
        <button class="btn btn-ghost" onclick="back()">← Back</button>
        <button class="btn btn-primary btn-big" onclick="next()">Start walkthrough →</button>
      </div>
    </div>
  `;
}

// ---------------------------------------------------------------------------
// Screen 3..N — Operation question
// ---------------------------------------------------------------------------
function renderOperation(opIdx) {
  const op = OPERATIONS[opIdx];
  const ans = state.answers[op.id] || {};
  const val = ans.skipped ? '' : (ans.hours != null ? String(ans.hours) : '');

  screenEl.innerHTML = `
    <div class="op-step">
      <div class="op-main">
        <div class="step-num">Step ${opIdx + 1} of ${OPERATIONS.length} · ${op.dept}</div>
        <h1>${op.heading}</h1>
        <div class="prompt">${op.prompt}</div>

        <div class="input-row">
          <div class="stepper ${ans.skipped ? 'skipped' : ''}" id="stepper">
            <button class="stepper-btn" onclick="stepBy(-0.25)" ${ans.skipped ? 'disabled' : ''}>−</button>
            <input class="stepper-input"
                   id="timeInput"
                   type="number" step="0.25" min="0"
                   value="${val}"
                   placeholder="0"
                   ${ans.skipped ? 'disabled' : ''}
                   oninput="onTimeInput()"
                   onkeydown="if (event.key === 'Enter') next()">
            <button class="stepper-btn" onclick="stepBy(0.25)" ${ans.skipped ? 'disabled' : ''}>+</button>
          </div>
          <span class="stepper-unit">hours</span>
        </div>

        <div class="step-nav">
          <button class="btn btn-ghost" onclick="back()">← Back</button>
          <div class="step-nav-right">
            <button class="btn" onclick="skipStep()">${ans.skipped ? 'Un-skip' : 'Skip'}</button>
            <button class="btn btn-primary" onclick="next()">${opIdx === OPERATIONS.length - 1 ? 'See summary →' : 'Next →'}</button>
          </div>
        </div>
      </div>

      <aside class="op-side">
        <div class="map-label">Walkthrough</div>
        <ul class="side-steps">
          ${OPERATIONS.map((o, i) => {
            const a = state.answers[o.id];
            const isDone = a && (a.skipped || a.hours != null);
            const cls = i === opIdx ? 'current' : (a && a.skipped ? 'skipped done' : (isDone ? 'done' : ''));
            const chk = a && a.skipped ? '—' : (a && a.hours != null ? '✓' : (i === opIdx ? '' : (i + 1)));
            const hrs = a && a.skipped ? 'skipped' : (a && a.hours != null ? fmtHrs(a.hours) : '');
            return `<li class="side-step ${cls}" onclick="jumpTo(${i + STEP.OPS_START})">
              <span class="chk">${chk}</span>
              <span>${o.heading}</span>
              <span class="hrs">${hrs}</span>
            </li>`;
          }).join('')}
        </ul>
        <div class="side-running">
          <span class="lbl">So far</span>
          <span class="val">${fmtHrs(runningTotal())}</span>
        </div>
      </aside>
    </div>
  `;
  setTimeout(() => { const el = document.getElementById('timeInput'); if (el && !ans.skipped) el.focus(); }, 40);
}

function stepBy(delta) {
  const el = document.getElementById('timeInput');
  if (!el || el.disabled) return;
  const current = parseFloat(el.value) || 0;
  const next = Math.max(0, Math.round((current + delta) * 4) / 4);
  el.value = next;
  onTimeInput();
}

function onTimeInput() {
  // No-op for now — live-update not required. Keeps value in the DOM for next()/jumpTo() to read.
}

// ---------------------------------------------------------------------------
// Screen last — Summary
// ---------------------------------------------------------------------------
function renderSummary() {
  const deptHrs = { Engineering: 0, CNC: 0, Assembly: 0, Finish: 0 };
  OPERATIONS.forEach(op => {
    const a = state.answers[op.id];
    if (a && !a.skipped && a.hours != null) deptHrs[op.dept] += a.hours;
  });
  const totalHrs = deptHrs.Engineering + deptHrs.CNC + deptHrs.Assembly + deptHrs.Finish;
  const rates = state.shopRates;
  const deptCost = {
    Engineering: deptHrs.Engineering * rates.Engineering,
    CNC: deptHrs.CNC * rates.CNC,
    Assembly: deptHrs.Assembly * rates.Assembly,
    Finish: deptHrs.Finish * rates.Finish,
  };
  const totalCost = deptCost.Engineering + deptCost.CNC + deptCost.Assembly + deptCost.Finish;
  const perLFHrs = totalHrs / 8;
  const perLFCost = totalCost / 8;
  const maxHrs = Math.max(deptHrs.Engineering, deptHrs.CNC, deptHrs.Assembly, deptHrs.Finish, 0.01);

  // Simple sanity check
  let sanityHTML;
  if (totalHrs < 3) {
    sanityHTML = `<div class="sanity warn"><strong>Heads up —</strong> ${fmtHrs(totalHrs)} total is low for a full base cabinet. Worth a second look.</div>`;
  } else if (totalHrs > 22) {
    sanityHTML = `<div class="sanity warn"><strong>Heads up —</strong> ${fmtHrs(totalHrs)} total is on the high end. That's fine for hand-tool shops or high-end work — worth a gut-check.</div>`;
  } else {
    sanityHTML = `<div class="sanity good"><strong>Looks solid.</strong> Totals are in range for a custom millwork shop.</div>`;
  }

  const deptRow = (dept, cls) => `
    <div class="dept-row ${cls}">
      <div class="name">${dept}</div>
      <div class="bar-wrap"><div class="bar" style="width:${(deptHrs[dept] / maxHrs) * 100}%"></div></div>
      <div class="hrs">${fmtHrs(deptHrs[dept])}</div>
      <div class="cost">${money(deptCost[dept])}</div>
    </div>`;

  screenEl.innerHTML = `
    <div class="summary">
      <h1>Here's your 8' base cabinet.</h1>
      <div class="sub">Prefinished box, grain-matched veneer slab doors, clear matte finish, fully assembled.</div>

      <div class="summary-grid">
        <div class="card">
          <div class="card-title">Total labor</div>
          <div class="headline-num">${fmtHrs(totalHrs)}</div>
          <div class="headline-label">${money(totalCost)} at your shop rates</div>
          <div style="height: 14px"></div>
          <div class="dept-rows">
            ${deptRow('Engineering', 'eng')}
            ${deptRow('CNC', 'cnc')}
            ${deptRow('Assembly', 'assembly')}
            ${deptRow('Finish', 'finish')}
          </div>
        </div>

        <div class="card">
          <div class="card-title">Per linear foot</div>
          <div class="headline-num">${perLFHrs.toFixed(2)} hrs/LF</div>
          <div class="headline-label">${money(perLFCost)} / LF labor</div>
          <div style="height: 18px"></div>
          <div style="font-size: 12.5px; color: #999; line-height: 1.6;">
            Your base-cabinet labor rate. A 12' base run = ${(perLFHrs * 12).toFixed(2)} hrs (${money(perLFCost * 12)}).
          </div>
        </div>
      </div>

      ${sanityHTML}

      <div style="font-size: 13px; color: #999; margin: 24px 0 10px; font-weight: 500;">Edit any step.</div>
      <div class="edit-table">
        <div class="edit-table-head">
          <span>#</span><span>Step</span><span style="text-align:right">Hours</span><span></span>
        </div>
        ${OPERATIONS.map((op, i) => {
          const a = state.answers[op.id] || {};
          const deptCls = op.dept.toLowerCase();
          const val = a.skipped ? '' : (a.hours != null ? a.hours : '');
          return `<div class="edit-table-row">
            <span class="step-idx">${i + 1}</span>
            <span class="step-desc">${op.heading}<span class="dept-tag ${deptCls}">${op.dept}</span></span>
            ${a.skipped
              ? `<span class="skipped-tag">skipped</span>`
              : `<input class="edit-time" type="number" step="0.25" min="0" value="${val}" placeholder="—" oninput="editRow('${op.id}', this.value)">`
            }
            <span class="row-skip" onclick="toggleSkipRow('${op.id}')">${a.skipped ? 'un-skip' : 'skip'}</span>
          </div>`;
        }).join('')}
      </div>

      <div class="summary-actions">
        <button class="btn btn-ghost" onclick="back()">← Back</button>
        <button class="btn btn-primary btn-big" onclick="state.stepIndex=STEP.SELECTOR; render(); toast('Base-cabinet rates saved.')">Save and continue →</button>
      </div>
    </div>
  `;
}

function editRow(opId, raw) {
  const v = parseFloat(raw);
  if (!raw && raw !== '0') { state.answers[opId] = { hours: null, skipped: false }; }
  else if (!isNaN(v)) { state.answers[opId] = { hours: Math.max(0, v), skipped: false }; }
  renderSummary();
}
function toggleSkipRow(opId) {
  const a = state.answers[opId] || {};
  state.answers[opId] = a.skipped ? { hours: null, skipped: false } : { hours: 0, skipped: true };
  renderSummary();
}

// ---------------------------------------------------------------------------
// Navigation
// ---------------------------------------------------------------------------
function captureCurrentInput() {
  const idx = state.stepIndex;
  if (idx < STEP.OPS_START || idx >= STEP.OPS_START + OPERATIONS.length) return true;
  const op = OPERATIONS[idx - STEP.OPS_START];
  const existing = state.answers[op.id] || {};
  if (existing.skipped) return true;
  const el = document.getElementById('timeInput');
  if (!el) return true;
  const raw = el.value;
  if (raw === '' || raw == null) { return 'empty'; }
  const v = parseFloat(raw);
  if (isNaN(v) || v < 0) return 'bad';
  state.answers[op.id] = { hours: Math.max(0, v), skipped: false };
  return true;
}

function next() {
  const res = captureCurrentInput();
  if (res === 'empty') { toast('Enter a number of hours, or click Skip.'); return; }
  if (res === 'bad')   { toast('Try a number like 1.5 or 2.'); return; }
  if (state.stepIndex < TOTAL_STEPS - 1) state.stepIndex += 1;
  render();
}
function back() {
  // capture but don't validate — allow silent back
  const idx = state.stepIndex;
  if (idx >= STEP.OPS_START && idx < STEP.OPS_START + OPERATIONS.length) {
    const op = OPERATIONS[idx - STEP.OPS_START];
    const existing = state.answers[op.id] || {};
    if (!existing.skipped) {
      const el = document.getElementById('timeInput');
      if (el && el.value !== '') {
        const v = parseFloat(el.value);
        if (!isNaN(v)) state.answers[op.id] = { hours: Math.max(0, v), skipped: false };
      }
    }
  }
  if (state.stepIndex > 0) state.stepIndex -= 1;
  render();
}
function jumpTo(idx) {
  back(); // soft save
  state.stepIndex = idx;
  render();
}
function skipStep() {
  const idx = state.stepIndex;
  if (idx < STEP.OPS_START || idx >= STEP.OPS_START + OPERATIONS.length) return;
  const op = OPERATIONS[idx - STEP.OPS_START];
  const a = state.answers[op.id] || {};
  if (a.skipped) {
    state.answers[op.id] = { hours: null, skipped: false };
    render();
    return;
  }
  state.answers[op.id] = { hours: 0, skipped: true };
  if (state.stepIndex < TOTAL_STEPS - 1) state.stepIndex += 1;
  render();
}
function runningTotal() {
  return OPERATIONS.reduce((s, op) => {
    const a = state.answers[op.id];
    return s + (a && !a.skipped && a.hours != null ? a.hours : 0);
  }, 0);
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), 2400);
}

render();
</script>
</body>
</html>
